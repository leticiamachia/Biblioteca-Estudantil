<!DOCTYPE html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Biblioteca Estudantil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
  <link rel="stylesheet" href="pi.css">
</head>

<body>
  <header class="ifpr-header">
    <div class="container">
      <div class="logo">
        <img src="images-removebg-preview.png" alt="IFPR" class="img1">
      </div>
      <h1>Biblioteca IFPR</h1>
      <p>Sistema de Livros</p>
    </div>
  </header>

  <div class="container divsugestao mx-auto">
    <div class="mb-3">
      <label for="exampleFormControlInput1" class="form-label">Nome Completo:</label>
      <input type="email" class="form-control" id="nome" placeholder="Nome...">
    </div>
    <div class="mb-3">
      <label for="exampleFormControlInput1" class="form-label">Matrícula:</label>
      <input type="email" class="form-control" id="matricula" placeholder="30123445...">
    </div>
    <div class="mb-3">
      <label for="exampleFormControlInput1" class="form-label">E-mail:</label>
      <input type="email" class="form-control" id="email" placeholder="name@example.com">
    </div>
    <div class="mb-3">
      <label for="exampleFormControlTextarea1" class="form-label">Nome do Livro Sugerido e Autor:</label>
      <textarea class="form-control" id="sugestao" rows="2"></textarea>
    </div>
    <div class="text-center">
      <button id="btnEnviar" class="btn ifbr-btn-outline">Enviar</button>
    </div>
  </div>

  <footer class="ifpr-footer">
    <div class="container text-center">
      <p>Instituto Federal do Paraná</p>
      <p>Biblioteca Digital 2025</p>
    </div>
  </footer>

  <div class="modal fade" id="modalSucesso" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title">Sugestão Enviada!</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          Sua sugestão foi registrada com sucesso. Obrigado por contribuir com a biblioteca!
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-success" data-bs-dismiss="modal">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq"
    crossorigin="anonymous"></script>
  <script src="pi.js"></script>
</body>

</html>
