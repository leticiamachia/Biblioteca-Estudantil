<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Biblioteca IFPR</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="logo">
            <div class="logo-img">
                <img src="images-removebg-preview.png" alt="IFPR" class="img1">
            </div>
            <h1>IFPR leitor</h1>
            <p>Sistema de Acesso Estudantil</p>
        </div>

        <div class="card-login">
            <div class="card-header">
                <h2><i class="fas fa-sign-in-alt"></i> Acesso ao Sistema</h2>
            </div>

            <form id="login">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Matrícula ou CPF</label>
                    <input type="text" id="usuario" placeholder="Digite sua matrícula ou CPF" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Senha</label>
                    <div class="input-password">
                        <input type="password" id="password" placeholder="Digite sua senha" required>
                        <button type="button" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">

                    <a href="#">Esqueci a senha</a>
                </div>

                <div class="botoes-acesso">
                    <button type="submit" class="btn-login">
                        <i class="fas fa-sign-in-alt"></i> Entrar
                    </button>
                    <a href="pi.html" class="btn-visitante">
                        <i class="fas fa-eye"></i> Acessar como Visitante
                    </a>
                </div>
                <div class="registro">
                    <p>Novo usuário? <a href="#">Solicite acesso</a></p>
                </div>
            </form>

            <div class="info">
                <h3><i class="fas fa-info-circle"></i> Serviços Disponíveis</h3>
                <ul>
                    <li><i class="fas fa-check"></i> Acervo completo</li>
                    <li><i class="fas fa-check"></i> Resenha </li>
                    <li><i class="fas fa-check"></i> Reservas</li>
                    <li><i class="fas fa-check"></i> E-books</li>
                </ul>
            </div>
        </div>

        <footer>
            <p>Instituto Federal do Paraná</p>
            <p>IFPR leitor 2025</p>
        </footer>
    </div>


</body>

</html>
